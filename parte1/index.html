<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Alumnos (Cliente)</title>
    <style>
        body { font-family: 'Inter', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 40px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #1a1a1a; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { border-color: #007bff; outline: none; }
        button { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; font-weight: 600; }
        tr:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cargar Alumno (Solo Cliente)</h1>
        <form id="studentForm">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" required>
            </div>
            <div class="form-group">
                <label for="edad">Edad:</label>
                <input type="number" id="edad" required min="1">
            </div>
            <div class="form-group">
                <label for="nota">Nota:</label>
                <input type="number" id="nota" step="0.1" required min="0" max="10">
            </div>
            <button type="submit">Guardar y Recargar</button>
            <p style="text-align:center; font-size: 0.9em; color: gray;">(Los datos se guardan en el navegador via localStorage)</p>
        </form>

        <h2>Lista de Alumnos</h2>
        <table id="studentsTable">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Nota</th>
                </tr>
            </thead>
            <tbody>
                <!-- Contenido generado por JS -->
            </tbody>
        </table>
    </div>

    <script>
        // Cargar y mostrar datos al iniciar la página
        window.addEventListener('load', () => {
            const studentsStr = localStorage.getItem('alumnos_db');
            let students = studentsStr ? JSON.parse(studentsStr) : [];

            // Ordenar por nota (descendente) y luego por nombre (ascendente)
            students.sort((a, b) => {
                if (b.nota !== a.nota) {
                    return b.nota - a.nota;
                }
                return a.nombre.localeCompare(b.nombre);
            });

            const tbody = document.querySelector('#studentsTable tbody');
            students.forEach(student => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${student.nombre}</td>
                    <td>${student.edad}</td>
                    <td>${student.nota}</td>
                `;
                tbody.appendChild(tr);
            });
        });

        // Guardar nuevo alumno
        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const edad = parseInt(document.getElementById('edad').value);
            const nota = parseFloat(document.getElementById('nota').value);

            const studentsStr = localStorage.getItem('alumnos_db');
            let students = studentsStr ? JSON.parse(studentsStr) : [];
            
            students.push({ nombre, edad, nota });
            localStorage.setItem('alumnos_db', JSON.stringify(students));
            
            // Recargar la página explícitamente solicitada
            window.location.reload();
        });
    </script>
</body>
</html>
